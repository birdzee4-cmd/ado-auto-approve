<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADO Auto-Approve System</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="#1F4E79"/>
          <path d="M20 32 L28 40 L44 24" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>ADO Auto-Approve</h1>
      <p class="subtitle">ระบบอนุมัติ Pull Request อัตโนมัติ<br/>สำหรับ Staging Branch</p>

      <a href="/.auth/login/aad?post_login_redirect_uri=/dashboard.html" class="login-button">
        <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
          <rect x="10" y="1" width="9" height="9" fill="#7FBA00"/>
          <rect x="1" y="10" width="9" height="9" fill="#00A4EF"/>
          <rect x="10" y="10" width="9" height="9" fill="#FFB900"/>
        </svg>
        <span>Sign in with Microsoft 365</span>
      </a>

      <p class="footer-note">
        เฉพาะผู้ที่ได้รับอนุญาตเท่านั้น<br/>
        Authorized users only
      </p>
    </div>
  </div>

  <script>
    // หากเคย login แล้ว ให้พาไปหน้า dashboard ทันที
    fetch('/.auth/me')
      .then(r => r.json())
      .then(data => {
        if (data.clientPrincipal) {
          window.location.href = '/dashboard.html';
        }
      })
      .catch(() => {}); // ไม่ต้องทำอะไรถ้า error
  </script>
</body>
</html>
