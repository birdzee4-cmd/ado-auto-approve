<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Activity - ADO Auto-Approve</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <img src="/assets/buzzebees-icon.png" alt="BUZZEBEES" class="nav-icon" />
      <span class="brand">ADO Auto-Approve</span>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link">Dashboard</a>
        <a href="/merge.html" class="nav-link">Merge Lookup</a>
        <a href="/activity.html" class="nav-link nav-link-active">PR Activity</a>
        <a href="/logs.html" class="nav-link">Audit Logs</a>
        <a href="/health.html" class="nav-link">System Health</a>
      </div>
    </div>
    <div class="nav-right">
      <span id="userName" class="user-name">Loading...</span>
      <a href="/.auth/logout?post_logout_redirect_uri=/" class="logout-button">ออกจากระบบ</a>
      <img src="/assets/buzzebees-powered.png" alt="Powered by BUZZEBEES" class="nav-logo" />
    </div>
  </nav>

  <main class="dashboard">
    <div class="welcome-card activity-page">
      <div class="page-header">
        <div>
          <h1>PR Activity</h1>
          <p>ตรวจสอบ PR ที่คุณอนุมัติในช่วง 24 ชั่วโมงล่าสุด พร้อมสถานะล่าสุดของ Build และ Policy</p>
        </div>
        <button id="btnRefreshActivity" class="primary-button">
          <span>🔄</span>
          <span>Refresh Activity</span>
        </button>
      </div>

      <div id="activityResult" hidden></div>

      <div id="completedSection" class="completed-section" hidden>
        <div class="completed-header">
          <h3>Recently Approved</h3>
          <div class="completed-meta-wrap">
            <span id="completedMeta" class="completed-meta"></span>
            <div id="completedPager" class="completed-pager" hidden></div>
          </div>
        </div>
        <div class="pr-table-wrap completed-table-wrap">
          <table class="pr-table completed-table">
            <thead>
              <tr>
                <th>PR ID</th>
                <th>Title</th>
                <th>By</th>
                <th>Branch</th>
                <th>Result</th>
                <th>Repo</th>
                <th>Approved</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="completedTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
