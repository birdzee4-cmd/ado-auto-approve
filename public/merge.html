<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merge Lookup - ADO Auto-Approve</title>
  <link rel="stylesheet" href="/core.css" />
  <link rel="stylesheet" href="/dashboard.css" />
  <link rel="stylesheet" href="/merge.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <img src="/assets/buzzebees-icon.png" alt="BUZZEBEES" class="nav-icon" />
      <span class="brand">ADO Auto-Approve</span>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link">Dashboard</a>
        <a href="/activity.html" class="nav-link">Activity</a>
        <a href="/merge.html" class="nav-link nav-link-active">Merge Lookup</a>
        <a href="/logs.html" class="nav-link">Audit Logs</a>
        <a href="/health.html" class="nav-link">System Health</a>
      </div>
    </div>
    <div class="nav-right">
      <span id="userName" class="user-name">Loading...</span>
      <a href="/.auth/logout?post_logout_redirect_uri=/" class="logout-button">ออกจากระบบ</a>
      <img src="/assets/buzzebees-powered.png" alt="Powered by BUZZEBEES" class="nav-logo" />
    </div>
  </nav>

  <main class="dashboard">
    <div class="welcome-card merge-page">
      <div class="page-header">
        <div>
          <h1>Merge PR CI/CD Lookup</h1>
          <p>ตรวจสอบ PR ประเภท Merge ว่าควรใช้ CI/CD ชุดใด โดยเทียบ branch mapping และ build run จาก Azure DevOps</p>
        </div>
      </div>

      <div class="merge-lookup-panel">
        <label class="filter-field merge-pr-field">
          <span>PR ID</span>
          <input id="mergePrId" type="text" inputmode="numeric" placeholder="เช่น 342520" />
        </label>
        <button id="btnMergeLookup" class="primary-button">
          <span>🔎</span>
          <span>Check PR</span>
        </button>
      </div>

      <div id="mergeResult" class="test-result result-info">
        กรอกเลข PR แล้วกด Check PR เพื่อค้นหา CI/CD ที่เกี่ยวข้อง
      </div>

      <div id="mergeLookupDetails" class="merge-details" hidden></div>
    </div>
  </main>

  <script type="module" src="/merge.js"></script>
</body>
</html>
