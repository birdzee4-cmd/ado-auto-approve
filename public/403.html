<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/buzzebees-icon.png" />
  <title>Access Forbidden - ADO Auto-Approve</title>
  <link rel="stylesheet" href="/core.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <img src="/assets/buzzebees-icon.png" alt="BUZZEBEES" class="login-logo" />
      </div>
      <h1 style="color:#dc2626">Access Forbidden</h1>
      <p class="subtitle">
        You do not have permission to access this application.<br/>
        Please choose another available application or contact your administrator.
      </p>
      <div style="display:grid;gap:10px">
        <a href="/applications.html" class="login-button">
          <span>Back to Applications</span>
        </a>
        <a href="/.auth/logout?post_logout_redirect_uri=/" class="secondary-button" style="min-height:46px">
          <span>Logout</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
