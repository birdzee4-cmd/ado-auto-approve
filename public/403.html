<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Forbidden - ADO Auto-Approve</title>
  <link rel="stylesheet" href="/core.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <img src="/assets/buzzebees-icon.png" alt="BUZZEBEES" class="login-logo" />
      </div>
      <h1 style="color:#dc2626">Access Forbidden</h1>
      <p class="subtitle">
        You do not have permission to access ADO Auto-Approve.<br/>
        Please contact your administrator to request access.
      </p>
      <a href="/.auth/logout?post_logout_redirect_uri=/" class="login-button">
        <span>Sign out</span>
      </a>
    </div>
  </div>
</body>
</html>
