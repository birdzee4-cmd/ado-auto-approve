name: Daily PR Summary Notification

on:
  # Azure Logic Apps Consumption is the primary 18:00 Asia/Bangkok scheduler.
  # Keep this manual trigger as an emergency fallback.
  workflow_dispatch:

jobs:
  send-daily-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily PR summary
        env:
          DAILY_SUMMARY_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_WAVE_09CFF3700 }}
        run: |
          if [ -z "$DAILY_SUMMARY_TOKEN" ]; then
            echo "Static Web Apps API token secret is not configured."
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST \
            --header "x-daily-summary-token: ${DAILY_SUMMARY_TOKEN}" \
            "https://mango-wave-09cff3700.7.azurestaticapps.net/api/daily-summary"
